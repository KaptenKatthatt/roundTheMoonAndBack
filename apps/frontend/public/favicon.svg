<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 3D sphere gradient -->
    <radialGradient id="sphere" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#f0f0f0"/>
      <stop offset="70%" stop-color="#c0c0c0"/>
      <stop offset="95%" stop-color="#606060"/>
      <stop offset="100%" stop-color="#202020"/>
    </radialGradient>
  </defs>
  
  <!-- Base Moon -->
  <circle cx="50" cy="50" r="48" fill="url(#sphere)" />
  
  <!-- Lunar Maria (Dark regions) -->
  <g fill="#777777" opacity="0.45" filter="blur(1px)">
    <path d="M 30 20 Q 45 10 50 25 Q 40 35 30 20 Z" />
    <path d="M 60 25 Q 80 20 75 40 Q 55 45 60 25 Z" />
    <path d="M 20 50 Q 30 40 40 55 Q 30 70 20 50 Z" />
    <path d="M 50 60 Q 70 50 80 65 Q 60 80 50 60 Z" />
    <circle cx="45" cy="35" r="12" />
    <circle cx="68" cy="42" r="14" />
    <circle cx="35" cy="58" r="16" />
    <circle cx="55" cy="22" r="9" />
  </g>

  <!-- Prominent Craters & Rays (e.g., Tycho, Copernicus) -->
  <g opacity="0.8">
    <!-- Tycho -->
    <circle cx="45" cy="78" r="3" fill="#eeeeee" stroke="#999999" stroke-width="0.5"/>
    <path d="M 45 78 L 25 45 M 45 78 L 55 35 M 45 78 L 15 70 M 45 78 L 75 60 M 45 78 L 80 85 M 45 78 L 30 90" stroke="#f0f0f0" stroke-width="0.6" opacity="0.5"/>
    
    <!-- Copernicus -->
    <circle cx="32" cy="40" r="2.5" fill="#e0e0e0" stroke="#888888" stroke-width="0.5"/>
    <path d="M 32 40 L 20 20 M 32 40 L 45 15 M 32 40 L 15 45" stroke="#e0e0e0" stroke-width="0.5" opacity="0.5"/>

    <!-- Kepler -->
    <circle cx="20" cy="45" r="1.5" fill="#dddddd" stroke="#999999" stroke-width="0.5"/>
  </g>

  <!-- Smaller scattered craters -->
  <g fill="#666666" opacity="0.6">
    <circle cx="70" cy="30" r="1.5" />
    <circle cx="62" cy="20" r="1" />
    <circle cx="52" cy="12" r="1.5" fill="#888"/>
    <circle cx="82" cy="52" r="2" />
    <circle cx="76" cy="62" r="1" />
    <circle cx="86" cy="40" r="1.5" />
    <circle cx="22" cy="28" r="1.5" />
    <circle cx="32" cy="85" r="1" />
    <circle cx="58" cy="88" r="1.5" fill="#999"/>
    <circle cx="40" cy="60" r="1" />
  </g>
</svg>